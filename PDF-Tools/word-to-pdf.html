<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Word to PDF â€” PDF Tools Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="brand"><span class="brand-mark">P</span><span class="brand-text">PDF Tools Pro</span></a>
    <div style="display:flex;gap:12px;align-items:center"><a href="index.html" class="button button-outline">Home</a></div>
  </nav>
  <main class="page-shell">
    <h2>Word to PDF</h2>
    <p>Convert Word documents to PDF.</p>
    <section class="section-upload">
      <div class="upload-panel">
        <div class="upload-info"><button class="button button-primary" id="uploadButton">Upload DOCX</button></div>
        <div class="upload-area" id="uploadArea">
          <div class="upload-dropzone" id="uploadDropzone">Drop DOCX here or click upload</div>
          <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
          <div class="progress-meta"><span id="progressText">Waiting</span><strong id="progressPercent">0%</strong></div>
          <input type="file" id="fileInput" accept=".docx" hidden />
          <div style="display:flex;gap:8px;margin-top:12px;"><button class="button button-primary" id="downloadPdfButton" hidden>Download PDF</button></div>
        </div>
      </div>
    </section>
  </main>
  <div id="previewModal" class="preview-modal" aria-hidden="true" style="display:none;"><div class="preview-inner"><button id="previewClose" class="button button-outline">Close</button><iframe id="previewFrame" style="width:100%;height:80vh;border:0"></iframe></div></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
