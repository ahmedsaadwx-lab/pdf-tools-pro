<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>دمج PDF — PDF Tools Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="brand"><span class="brand-mark">P</span><span class="brand-text">PDF Tools Pro</span></a>
    <div class="nav-right">
      <div class="lang-switcher" id="langSwitcher">
        <button class="lang-button" id="langButton" type="button" aria-haspopup="true" aria-expanded="false">العربية</button>
        <ul class="lang-menu" id="langMenu">
          <li data-lang="ar">العربية</li>
          <li data-lang="en">English</li>
          <li data-lang="es">Español</li>
          <li data-lang="tr">Türkçe</li>
        </ul>
      </div>
      <button class="lang-button" id="themeToggle" type="button" data-key="themeToggle" aria-pressed="false">داكن/فاتح</button>
      <a href="index.html" class="button button-outline">الرئيسية</a>
    </div>
  </nav>
  <main class="page-shell">
    <h2>دمج ملفات PDF</h2>
    <p>اختر ملفات PDF متعددة، رتبها حسب رغبتك، ثم دمجها في مستند واحد احترافي.</p>
    <section class="section-upload">
      <div class="upload-panel">
        <div class="upload-info">
          <div class="image-tool-toolbar">
            <button class="button button-primary" id="uploadButton">اختيار ملفات PDF</button>
            <button class="button button-outline" id="mergeButton" hidden>دمج وتحميل</button>
          </div>
          <p class="upload-hint">يمكنك السحب والإفلات أو اختيار ملفات متعددة من الجهاز.</p>
        </div>
        <div class="upload-area" id="uploadArea">
          <div class="upload-dropzone" id="uploadDropzone">اسحب ملفات PDF هنا أو انقر للاختيار</div>
          <div class="merge-file-list" id="mergeFileList"></div>
          <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
          <div class="progress-meta"><span id="progressText">في انتظار الملفات…</span><strong id="progressPercent">0%</strong></div>
          <input type="file" id="fileInput" accept=".pdf" multiple hidden />
          <div class="image-action-row">
            <button class="button button-outline" id="clearSelectionButton" hidden>مسح القائمة</button>
            <button class="button button-primary" id="downloadPdfButton" hidden>تحميل الملف المدمج</button>
          </div>
        </div>
      </div>
    </section>
  </main>
  <div id="previewModal" class="preview-modal" aria-hidden="true" style="display:none;"><div class="preview-inner"><button id="previewClose" class="button button-outline">Close</button><iframe id="previewFrame" style="width:100%;height:80vh;border:0"></iframe></div></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
