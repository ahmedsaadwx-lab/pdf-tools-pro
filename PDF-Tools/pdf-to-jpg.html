<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PDF to JPG — PDF Tools Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="brand"><span class="brand-mark">P</span><span class="brand-text">PDF Tools Pro</span></a>
    <div style="display:flex;gap:12px;align-items:center"><a href="index.html" class="button button-outline">Home</a></div>
  </nav>
  <main class="page-shell">
    <h2>PDF to JPG</h2>
    <p>Export PDF pages as JPG images.</p>
    <section class="section-upload">
      <div class="upload-panel">
        <div class="upload-info">
          <button class="button button-primary" id="uploadButton">Upload PDF</button>
          <button class="button button-primary" id="convertButton" hidden>Convert to JPG</button>
        </div>
        <div class="upload-area" id="uploadArea">
          <div class="upload-dropzone" id="uploadDropzone">Drop PDF here or click upload</div>
          <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
          <div class="progress-meta">
            <span id="progressText">Waiting</span>
            <strong id="progressPercent">0%</strong>
          </div>

          <div id="resultsContainer" class="results-grid"></div>

          <div class="image-action-row">
            <button class="button button-primary" id="downloadAllButton" hidden>Download All JPG</button>
            <button class="button button-outline" id="clearResultsButton" hidden>Clear Results</button>
          </div>

          <input type="file" id="fileInput" accept=".pdf" hidden />
        </div>
      </div>
    </section>
  </main>
  <div id="previewModal" class="preview-modal" aria-hidden="true" style="display:none;"><div class="preview-inner"><button id="previewClose" class="button button-outline">Close</button><iframe id="previewFrame" style="width:100%;height:80vh;border:0"></iframe></div></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
