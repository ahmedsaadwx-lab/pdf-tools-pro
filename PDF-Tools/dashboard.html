<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم — PDF Tools Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <nav class="navbar">
      <a href="index.html" class="brand">
        <span class="brand-mark">P</span>
        <span class="brand-text" data-key="brandText">PDF Tools Pro</span>
      </a>

      <ul class="nav-menu" id="navMenuMain">
        <li><a href="index.html" data-key="navTools">الصفحة الرئيسية</a></li>
        <li><a href="login.html" data-key="navLogin">تسجيل الدخول</a></li>
        <li><a href="register.html" data-key="navRegister">التسجيل</a></li>
      </ul>

      <div class="nav-right">

          <ul class="lang-menu" id="langMenu">

      <div id="uploadedFiles">لا توجد ملفات بعد.</div>
    </section>
    <section>

      <div id="conversionHistory">لا توجد عمليات بعد.</div>
    </section>
    <section>

      <div id="accountSettings">إعدادات بسيطة هنا.</div>
    </section>

  <script src="script.js"></script>
