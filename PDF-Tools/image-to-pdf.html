<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>صورة إلى PDF — PDF Tools Pro</title>
  <link rel="stylesheet" href="style.css" />
  <meta name="description" content="Convert images to PDF" />
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="brand"><span class="brand-mark">P</span><span class="brand-text">PDF Tools Pro</span></a>
    <div class="nav-right">
      <div class="lang-switcher" id="langSwitcher">
        <button class="lang-button" id="langButton" type="button" aria-haspopup="true" aria-expanded="false">العربية</button>
        <ul class="lang-menu" id="langMenu">
          <li data-lang="ar">العربية</li>
          <li data-lang="en">English</li>
          <li data-lang="es">Español</li>
          <li data-lang="tr">Türkçe</li>
        </ul>
      </div>
      <button class="lang-button" id="themeToggle" type="button" data-key="themeToggle" aria-pressed="false">داكن/فاتح</button>
      <a href="index.html" class="button button-outline">الرئيسية</a>
    </div>
  </nav>
  <main class="page-shell">
    <h2 data-key="toolImageToPdfTitle">صورة إلى PDF</h2>
    <p data-key="toolImageToPdfText">حوّل صور JPG, PNG, وWEBP إلى ملف PDF واحد.</p>

    <section class="section-upload">
      <div class="upload-panel">
        <div class="upload-info">
          <div class="image-tool-toolbar">
            <button class="button button-primary" id="uploadButton">تحميل الصور</button>
            <div class="mode-group" role="radiogroup" aria-label="Conversion mode">
              <label class="mode-option"><input type="radio" name="conversionMode" value="single" checked /> <span>دمج جميع الصور في ملف PDF واحد</span></label>
              <label class="mode-option"><input type="radio" name="conversionMode" value="separate" /> <span>إنشاء ملفات PDF منفصلة</span></label>
            </div>
          </div>
          <div class="image-format-controls">
            <label class="option-field">
              <span>حجم الصفحة</span>
              <select id="pageSizeSelect">
                <option value="a4">A4</option>
                <option value="letter">Letter</option>
                <option value="auto">Auto</option>
              </select>
            </label>
            <div class="orientation-group" role="radiogroup" aria-label="Page orientation">
              <label class="mode-option"><input type="radio" name="pageOrientation" value="portrait" checked /> <span>عمودي</span></label>
              <label class="mode-option"><input type="radio" name="pageOrientation" value="landscape" /> <span>أفقي</span></label>
            </div>
          </div>
          <p class="upload-hint" data-key="uploadHint">يدعم JPG, PNG, WEBP حتى 20MB لكل صورة.</p>
        </div>
        <div class="upload-area" id="uploadArea">
          <div class="upload-dropzone" id="uploadDropzone">اسحب الصور هنا أو انقر للاختيار</div>
          <div class="image-preview-grid" id="imagePreviewContainer"></div>
          <div class="progress-bar"><div class="progress-bar-fill" id="progressFill"></div></div>
          <div class="progress-meta"><span id="progressText">Waiting</span><strong id="progressPercent">0%</strong></div>
          <div class="image-action-row">
            <button class="button button-outline" id="clearSelectionButton" hidden>مسح الاختيار</button>
            <button class="button button-primary" id="convertButton" hidden>حفظ PDF</button>
            <button class="button button-outline" id="downloadPdfButton" hidden data-key="downloadPdfButton">تحميل PDF</button>
          </div>
          <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp" multiple hidden />
        </div>
      </div>
    </section>

  </main>
  <div id="previewModal" class="preview-modal" aria-hidden="true" style="display:none;">
    <div class="preview-inner">
      <button id="previewClose" class="button button-outline">Close</button>
      <iframe id="previewFrame" style="width:100%;height:80vh;border:0"></iframe>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
